name: fireguard_app
description: "FireGuard - Sistem Cepat Tanggap Bencana Kec. Plaju, Palembang"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management - Riverpod
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Local Storage
  shared_preferences: ^2.5.2
  flutter_secure_storage: ^9.2.4

  # Maps & Location
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  flutter_map_location_marker: ^10.0.0

  # Camera & Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0
  amicons: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
